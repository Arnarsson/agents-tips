<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="moss" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.021" numOctaves="5" seed="19" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0.00 0.00 0.00 0 0.00
        0.02 0.72 0.08 0 0.02
        0.00 0.18 0.03 0 0.00
        0.00 0.00 0.00 1 0" result="green"/>
      <feComponentTransfer in="green">
        <feFuncR type="gamma" amplitude="0.55" exponent="1.8"/>
        <feFuncG type="gamma" amplitude="1.35" exponent="0.72"/>
        <feFuncB type="gamma" amplitude="0.75" exponent="1.5"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="vignette" cx="34%" cy="48%" r="76%">
      <stop offset="0%" stop-color="#05240d" stop-opacity="0"/>
      <stop offset="54%" stop-color="#030604" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020302" stop-opacity="0.82"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="#020403"/>
  <rect width="1600" height="900" filter="url(#moss)" opacity="0.95"/>
  <circle cx="230" cy="620" r="420" fill="#16a34a" opacity="0.12"/>
  <circle cx="1030" cy="180" r="360" fill="#22c55e" opacity="0.08"/>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
